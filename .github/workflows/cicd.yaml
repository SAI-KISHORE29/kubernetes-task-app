name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest
        env:
          CI: true

      - name: Build Docker image (validation only)
        run: docker build -t simple-fastapi-app:pr-${{ github.event.pull_request.number }} .


  test-build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest
        env:
          CI: true

      - name: Set image version tag
        id: version
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/simple-fastapi-app:${{ steps.version.outputs.tag }}

      - name: Checkout deploy repository
        uses: actions/checkout@v4
        with:
          repository: SAI-KISHORE29/kubernetes-task-deployment
          token: ${{ secrets.GH_PAT }}
          path: kubernetes-task-deployment

      - name: Update image tag in deployment.yaml
        run: |
          # Robust regex to find the image line and swap the tag
          sed -i "s|image: .*/simple-fastapi-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/simple-fastapi-app:${{ steps.version.outputs.tag }}|g" kubernetes-task-deployment/deployment.yaml

      - name: Raise PR to deploy repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd kubernetes-task-deployment
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH="update-image-${{ steps.version.outputs.tag }}"
          git checkout -b $BRANCH
          git add deployment.yaml
          git commit -m "chore: update image tag to ${{ steps.version.outputs.tag }}"
          git push origin $BRANCH
          
          gh pr create \
            --repo SAI-KISHORE29/kubernetes-task-deployment \
            --base main \
            --head $BRANCH \
            --title "chore: update image tag to ${{ steps.version.outputs.tag }}" \
            --body "Automated PR: update container image to \`${{ secrets.DOCKER_USERNAME }}/simple-fastapi-app:${{ steps.version.outputs.tag }}\`"